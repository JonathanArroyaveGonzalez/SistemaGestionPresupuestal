name: Build, publish and deploy to MonsterASP.NET
on: [push]

jobs:
  build_and_deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0
          
      - name: Install dependencies
        run: dotnet restore SAPFIAI.sln
        
      - name: Build
        run: dotnet build SAPFIAI.sln --configuration Release --no-restore

      - name: Test with .NET
        run: dotnet test SAPFIAI.sln --configuration Release --no-build

      - name: Restore Web publish runtime assets
        run: dotnet restore src/Web/Web.csproj --runtime win-x86

      - name: Publish
        run: dotnet publish src/Web/Web.csproj --configuration Release --runtime win-x86 --self-contained false --output ./publish --no-restore

      - name: Deploy to MonsterASP.NET via WebDeploy
        uses: rasmusbuchholdt/simply-web-deploy@2.1.0
        with:
          website-name: ${{ secrets.WEBSITE_NAME }}
          server-computer-name: ${{ secrets.SERVER_COMPUTER_NAME }}
          server-username: ${{ secrets.SERVER_USERNAME }}
          server-password: ${{ secrets.SERVER_PASSWORD }}