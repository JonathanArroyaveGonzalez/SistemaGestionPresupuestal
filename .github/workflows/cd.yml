name: Build, publish and deploy to MonsterASP.NET

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0

      - name: Restore
        run: dotnet restore SAPFIAI.sln

      - name: Build
        run: dotnet build SAPFIAI.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test SAPFIAI.sln --configuration Release --no-build

      - name: Publish
        run: dotnet publish src/Web/Web.csproj --configuration Release --runtime win-x86 --self-contained false /p:UseAppHost=false --output ./publish

      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.FTP_HOST }}
          port: 22
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local_path: ./publish/*
          remote_path: /wwwroot
          sftp_only: true
